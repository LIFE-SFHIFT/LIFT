# 로컬 bootRun에서 프로젝트 루트 .env의 OPENAI_*, TOSS_* 등을 함께 읽는다.
spring.config.import=optional:file:.env[.properties]

# 운영 DB 미구성 상태에서 로컬 실행을 위한 임시 H2 인메모리 설정
spring.datasource.url=jdbc:h2:mem:lift;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update

lift.auth.jwt-secret=local-development-jwt-secret-32-bytes-minimum

lift.oauth.mock-enabled=true
lift.oauth.kakao.client-id=${KAKAO_CLIENT_ID:}

lift.oauth.naver.client-id=${NAVER_CLIENT_ID:}
lift.oauth.naver.client-secret=${NAVER_CLIENT_SECRET:}
