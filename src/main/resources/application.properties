spring.application.name=LIFT

# data.sql은 기본적으로 임베디드 DB(H2)에서만 자동 실행된다.
# Hibernate가 테이블을 만든 뒤 시드 데이터가 들어가도록 순서를 미룬다.
spring.jpa.defer-datasource-initialization=true

# JWT: 시크릿은 32바이트 이상. 비워두면 기동을 중단한다.
lift.auth.jwt-secret=${JWT_SECRET:}
lift.auth.access-token-ttl=${AUTH_ACCESS_TOKEN_TTL:1h}
lift.auth.refresh-token-ttl=${AUTH_REFRESH_TOKEN_TTL:14d}

# OAuth client ids are injected through environment variables in local/production environments.
lift.oauth.base-url=${LIFT_BASE_URL:http://localhost:8080}
lift.oauth.frontend-base-url=${LIFT_FRONTEND_BASE_URL:http://localhost:3000}
lift.cors.allowed-origins=${LIFT_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
# true면 client-id가 비어 있는 provider에 한해 개발용 모의 로그인을 허용한다. 운영에서는 반드시 false.
lift.oauth.mock-enabled=${OAUTH_MOCK_ENABLED:false}
# 카카오/네이버 실제 소셜 로그인 전체 스위치. 데모 기간에는 false로 두고 로컬 데모 로그인만 쓴다.
lift.oauth.social-enabled=${OAUTH_SOCIAL_ENABLED:false}
lift.oauth.kakao.client-id=${KAKAO_CLIENT_ID:}
lift.oauth.kakao.client-secret=${KAKAO_CLIENT_SECRET:}
lift.oauth.kakao.redirect-uri=${KAKAO_REDIRECT_URI:}
lift.oauth.kakao.scope=${KAKAO_SCOPE:}
lift.oauth.kakao.token-uri=${KAKAO_TOKEN_URI:}
lift.oauth.kakao.user-info-uri=${KAKAO_USER_INFO_URI:}
lift.oauth.naver.client-id=${NAVER_CLIENT_ID:}
lift.oauth.naver.client-secret=${NAVER_CLIENT_SECRET:}
lift.oauth.naver.redirect-uri=${NAVER_REDIRECT_URI:}
lift.oauth.naver.token-uri=${NAVER_TOKEN_URI:}
lift.oauth.naver.user-info-uri=${NAVER_USER_INFO_URI:}

# 행정안전부_대한민국 공공서비스(혜택) 정보. 서비스키는 서버 환경변수로만 주입한다.
lift.public-data.gov24.enabled=${GOV24_PUBLIC_SERVICE_ENABLED:false}
lift.public-data.gov24.service-key=${GOV24_PUBLIC_SERVICE_KEY:}
lift.public-data.gov24.base-url=${GOV24_PUBLIC_SERVICE_BASE_URL:https://api.odcloud.kr/api/gov24/v3}
lift.public-data.gov24.per-page=${GOV24_PUBLIC_SERVICE_PER_PAGE:1000}
lift.public-data.gov24.max-pages=${GOV24_PUBLIC_SERVICE_MAX_PAGES:2}
lift.public-data.gov24.max-keywords=${GOV24_PUBLIC_SERVICE_MAX_KEYWORDS:5}
lift.public-data.gov24.max-results=${GOV24_PUBLIC_SERVICE_MAX_RESULTS:15}
# 매일 정부24 API를 조회해 gov24_benefit_cache를 UPSERT하고, 신규/변경 건만 AI로 구조화 추출하는 스케줄러.
# 기본 off. 운영/수동 검증 시에만 GOV24_SYNC_ENABLED=true로 켠다.
lift.public-data.gov24.sync-enabled=${GOV24_SYNC_ENABLED:false}
lift.public-data.gov24.sync-cron=${GOV24_SYNC_CRON:0 0 9 * * *}
lift.public-data.gov24.sync-extract-batch-size=${GOV24_SYNC_EXTRACT_BATCH_SIZE:200}

# 토스페이먼츠 테스트 결제. 테스트 키(test_ck/test_sk)로만 데모에서 사용한다.
lift.payments.toss.enabled=${TOSS_PAYMENTS_ENABLED:false}
lift.payments.toss.secret-key=${TOSS_SECRET_KEY:}
lift.payments.toss.base-url=${TOSS_BASE_URL:https://api.tosspayments.com/v1}

# OpenAI는 리포트 기반 AI 챗봇과 공공데이터 후보의 설명/우선순위 정리에 사용한다.
# 키가 없거나 OPENAI_ENABLED=false이면 서버 규칙 fallback으로 동작한다.
lift.openai.enabled=${OPENAI_ENABLED:false}
lift.openai.api-key=${OPENAI_API_KEY:}
lift.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
lift.openai.model=${OPENAI_MODEL:gpt-5.4-mini}

# 지자체 게시판 RSS 지원사업/장려금 수집. 1차(제목 키워드)는 코드가, 2차(실제 지원사업 여부)는
# 위 lift.openai 설정을 재사용하는 AI가 판단한다(신규 API 키 불필요).
# 매시 정각으로 등록된 RSS 소스를 조회해 local_notice_item을 UPSERT하고, 신규/변경된 키워드
# 후보만 AI로 판단하는 스케줄러. 기본 off. 운영/수동 검증 시에만 LOCAL_NOTICE_SYNC_ENABLED=true로 켠다.
lift.local-notice.sync-enabled=${LOCAL_NOTICE_SYNC_ENABLED:false}
lift.local-notice.sync-cron=${LOCAL_NOTICE_SYNC_CRON:0 0 * * * *}
lift.local-notice.max-feed-items-per-source=${LOCAL_NOTICE_MAX_FEED_ITEMS:50}
# 1회 실행당 AI 호출 상한(버스트 제한)과, 지금까지(전체 기간) 누적 AI 호출 상한(예산 안전장치).
# 누적 상한에 도달하면 스케줄러가 몇 번을 돌든 더 이상 AI를 호출하지 않는다.
# gpt-5.4-mini 요금 기준 호출 1건당 약 $0.005 이하로 추정 — 기본 200회는 넉넉히 잡아도 약 $1 내외.
# 실제 지출 보장은 이 값만으로는 안 되므로, OpenAI 대시보드의 하드 사용량 한도도 함께 설정할 것.
lift.local-notice.max-judge-batch-size=${LOCAL_NOTICE_MAX_JUDGE_BATCH:20}
lift.local-notice.max-judge-calls-total=${LOCAL_NOTICE_MAX_JUDGE_CALLS_TOTAL:200}

# 지자체 RSS 파이프라인이 실제로 확정한 지역 지원사업/장려금을 읽어오는 외부 Supabase Postgres.
# 위 lift.local-notice.sync-*(이 앱 자체 수집)와는 별개로, 팀원이 계속 채우고 있는 원본을
# 매 요청마다 그대로 읽기만 한다(LocalNoticeSupabaseReader). 미설정(빈 값)이면 기능이 꺼진다.
lift.local-notice.datasource.url=${LOCAL_NOTICE_DATASOURCE_URL:}
lift.local-notice.datasource.username=${LOCAL_NOTICE_DATASOURCE_USERNAME:}
lift.local-notice.datasource.password=${LOCAL_NOTICE_DATASOURCE_PASSWORD:}
