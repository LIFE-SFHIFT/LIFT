services:
  - type: web
    name: lift-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: AUTH_ACCESS_TOKEN_TTL
        value: 1h
      - key: AUTH_REFRESH_TOKEN_TTL
        value: 14d
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: LIFT_CORS_ALLOWED_ORIGINS
        value: https://life-shift.netlify.app
      - key: LIFT_BASE_URL
        value: https://lift-api-c2z6.onrender.com
      - key: LIFT_FRONTEND_BASE_URL
        value: https://life-shift.netlify.app
      - key: OAUTH_MOCK_ENABLED
        value: false
      - key: KAKAO_CLIENT_ID
        sync: false
      - key: KAKAO_CLIENT_SECRET
        sync: false
      - key: KAKAO_REDIRECT_URI
        value: https://life-shift.netlify.app/login/callback/kakao
      - key: NAVER_CLIENT_ID
        sync: false
      - key: NAVER_CLIENT_SECRET
        sync: false
      - key: NAVER_REDIRECT_URI
        value: https://life-shift.netlify.app/login/callback/naver
      - key: GOV24_PUBLIC_SERVICE_ENABLED
        value: false
      - key: TOSS_PAYMENTS_ENABLED
        value: false
      - key: OPENAI_ENABLED
        value: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
