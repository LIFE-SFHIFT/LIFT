services:
  - type: web
    name: lift-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: AUTH_ACCESS_TOKEN_TTL
        value: 1h
      - key: AUTH_REFRESH_TOKEN_TTL
        value: 14d
      - key: LIFT_CORS_ALLOWED_ORIGINS
        value: https://your-lift-frontend.netlify.app
      - key: LIFT_BASE_URL
        value: https://lift-api.onrender.com
      - key: LIFT_FRONTEND_BASE_URL
        value: https://your-lift-frontend.netlify.app
      - key: OAUTH_MOCK_ENABLED
        value: true
      - key: GOV24_PUBLIC_SERVICE_ENABLED
        value: false
      - key: TOSS_PAYMENTS_ENABLED
        value: false
      - key: OPENAI_ENABLED
        value: false
